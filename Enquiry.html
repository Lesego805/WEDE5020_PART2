<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Enquiry | The Golden Crust</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-cream-page">

    <header>
        <h1>Product Enquiry</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="products.html">Products</a></li>
                <li><a href="enquiry.html" class="active">Enquiry</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="products-heading-container">
            <h2>Get in Touch</h2>
            <p>Have a question about our products or want to volunteer? Fill out the form below.</p>
        </div>

        <form action="#">
            <label for="name">Full Name:</label>
            <input type="text" id="name" name="name" required>

            <label for="email">Email Address:</label>
            <input type="email" id="email" name="email" required>
            
            <label for="interest">Interested in:</label>
            <select id="interest" name="interest">
                <option value="wholesale">Wholesale Orders</option>
                <option value="custom">Custom Cake/Pastry</option>
                <option value="volunteer">Volunteering</option>
                <option value="other">General Question</option>
            </select>

            <label for="message">Your Message:</label>
            <textarea id="message" name="message" rows="4"></textarea>
            
            <button type="submit">Submit Enquiry</button>
        </form>
    </main>

    <footer>
        <p>&copy; 2026 The Golden Crust. All rights reserved.</p>
    </footer>

</body>
</html>
